    <!-- =========================================
         Critical CSS (Above the Fold)
         ========================================= -->
    <style>
      /* Critical CSS - Inline for fastest first paint */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
        background-color: #ffffff;
        color: #1a1a1a;
        line-height: 1.5;
      }

      /* Root element setup */
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        isolation: isolate;
      }

      /* Skip link for accessibility */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #0a1f3d;
        color: #ffb800;
        padding: 8px 16px;
        z-index: 10000;
        font-weight: 600;
        text-decoration: none;
        border-radius: 0 0 4px 0;
        transition: top 0.2s ease;
      }

      .skip-link:focus {
        top: 0;
      }

      /* ============================================
         Initial Loader — Splash Screen
         Shown until React mounts, then fades out
         ============================================ */
      .initial-loader {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition:
          opacity 0.4s ease,
          visibility 0.4s ease;
      }

      .initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Wrapper */
      .loader-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 24px;
        max-width: 280px;
        width: 100%;
      }

      /* Brand Block */
      .loader-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .loader-logo-img {
        width: 180px;
        height: auto;
        object-fit: contain;
        animation: loaderFadeIn 0.6s ease both;
      }

      .loader-tagline {
        margin: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: #546e7a;
        letter-spacing: 0.04em;
        text-align: center;
        animation: loaderFadeIn 0.6s 0.2s ease both;
      }

      /* Progress Bar Track */
      .loader-bar-track {
        width: 100%;
        height: 3px;
        background: #eceef5;
        border-radius: 3px;
        overflow: hidden;
        animation: loaderFadeIn 0.4s 0.3s ease both;
      }

      .loader-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 3px;
        background: linear-gradient(90deg, #0a1f3d, #1e4a85, #ffb800);
        background-size: 200% 100%;
        animation:
          loaderProgress 2s 0.4s ease-in-out forwards,
          loaderShimmer 1.5s 0.4s ease-in-out infinite;
      }

      /* Loading Status Text */
      .loader-status {
        margin: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        font-size: 12px;
        font-weight: 400;
        color: #90a4ae;
        letter-spacing: 0.02em;
        animation: loaderFadeIn 0.4s 0.4s ease both;
      }

      /* Animated dots "Loading..." */
      .loader-dots::after {
        content: "";
        animation: loaderDots 1.4s steps(4, end) infinite;
      }

      /* ============================================
         Loader Keyframes
         ============================================ */
      @keyframes loaderFadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes loaderProgress {
        0% {
          width: 0%;
        }
        30% {
          width: 40%;
        }
        60% {
          width: 70%;
        }
        100% {
          width: 92%;
        }
      }

      @keyframes loaderShimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      @keyframes loaderDots {
        0% {
          content: "";
        }
        25% {
          content: ".";
        }
        50% {
          content: "..";
        }
        75% {
          content: "...";
        }
        100% {
          content: "";
        }
      }

      /* Safe area for notched devices (iPhone X+) */
      @supports (padding-bottom: env(safe-area-inset-bottom)) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
          padding-bottom: env(safe-area-inset-bottom);
        }
      }

      /* ============================================
         Reduced Motion — Respect user preference
         ============================================ */
      @media (prefers-reduced-motion: reduce) {
        .loader-logo-img,
        .loader-tagline,
        .loader-bar-track,
        .loader-status {
          animation: none;
          opacity: 1;
          transform: none;
        }
        .loader-bar-fill {
          animation: loaderProgress 2s ease-in-out forwards;
        }

        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }

        html {
          scroll-behavior: auto;
        }
      }

      /* ============================================
         Dark mode support (if user's OS is dark)
         ============================================ */
      @media (prefers-color-scheme: dark) {
        .initial-loader {
          background: #0a1f3d;
        }
        .loader-tagline {
          color: rgba(255, 255, 255, 0.6);
        }
        .loader-bar-track {
          background: rgba(255, 255, 255, 0.1);
        }
        .loader-status {
          color: rgba(255, 255, 255, 0.4);
        }
        .loader-logo-img {
          filter: brightness(0) invert(1);
        }
      }

      /* High contrast mode support */
      @media (prefers-contrast: high) {
        body {
          background-color: #000;
          color: #fff;
        }
      }

      /* Print styles */
      @media print {
        .initial-loader {
          display: none !important;
        }
      }
    </style>
  </head>

    <!-- Initial Loader — Branded Splash Screen -->
    <div

      <div class="loader-wrapper">

        <div class="loader-brand">

            src="https://placehold.co/400x400?text=TBD+Logo"
            alt=""

        <!-- Animated Progress Bar -->
        <div class="loader-bar-track">

        </div>

        <!-- Loading text -->
        <p class="loader-status">Loading<span class="loader-dots"></span></p>
      </div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Hide initial loader when React is ready -->
    <script>
      (function () {
        // Performance mark for load timing
        if (window.performance && window.performance.mark) {
          window.performance.mark("loader-start");
        }

        // Hide loader on window load
        window.addEventListener("load", function () {
          // Give React time to mount
          setTimeout(function () {
            var loader = document.getElementById("initial-loader");
            if (loader) {
              loader.classList.add("hidden");

              // Remove from DOM after transition
              setTimeout(function () {
                if (loader && loader.parentNode) {
                  loader.style.display = "none";
                }

                // Performance mark for load complete
                if (window.performance && window.performance.mark) {
                  window.performance.mark("loader-end");
                  window.performance.measure(
                    "app-load-time",
                    "loader-start",
                    "loader-end",
                  );
                }
              }, 400);
            }
          }, 200);
        });

        // Fallback: Hide loader after max timeout
        setTimeout(function () {
          var loader = document.getElementById("initial-loader");
          if (loader && !loader.classList.contains("hidden")) {
            loader.classList.add("hidden");
            setTimeout(function () {
              loader.style.display = "none";
            }, 400);
          }
        }, 5000);
      })();
    </script>

    <!-- Register touch events for mobile performance -->
    <script>
      document.addEventListener("touchstart", function () {}, {
        passive: true,
      });
    </script>
